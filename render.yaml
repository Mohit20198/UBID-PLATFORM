services:
  - type: web
    name: ubid-platform-api
    runtime: python
    region: singapore   # closest to Karnataka
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13.0"
      - key: CORS_ORIGIN
        value: "https://ubid-platform.vercel.app"
